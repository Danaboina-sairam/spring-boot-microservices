services:

  ## MySQL Docker Compose Config
  mysql-order-service:
    container_name: mysql-order-service
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: order-service
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Kolkata
    volumes:
      - ./mysql-order-service:/var/lib/mysql
    ports:
      - "3307:3306"
    restart: always
    networks:
      - s-network

  mysql-inventory-service:
    container_name: mysql-inventory-service
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: inventory-service
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Kolkata
    volumes:
      - ./mysql-inventory-service:/var/lib/mysql
    ports:
      - "3308:3306"
    restart: always
    networks:
      - s-network

  ## Mongo Docker Compose Config
  mongo-product-service:
    container_name: mongo-product-service
    image: mongo:4.4.14-rc0-focal
    volumes:
      - ./mongo-product-service-data:/data/db
    ports:
      - "27017:27017"
    restart: always
    networks:
      - s-network

  ## Keycloak Database
  keycloak-mysql:
    container_name: keycloak-mysql
    image: mysql:5.7
    volumes:
      - ./mysql_keycloak_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: keycloak
      MYSQL_USER: keycloak
      MYSQL_PASSWORD: password
    ports:
      - "3309:3306"
    networks:
      - s-network

  ## Keycloak
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:18.0.0
    command: ["start-dev", "--import-realm"]
    environment:
      DB_VENDOR: MYSQL
      DB_ADDR: keycloak-mysql
      DB_DATABASE: keycloak
      DB_USER: keycloak
      DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9191:8080"
    volumes:
      - ./realms/:/opt/keycloak/data/import/
    depends_on:
      - keycloak-mysql
    networks:
      - s-network

  #################################################################
  ## Kafka KRaft (ZooKeeper-Free)
  #################################################################
  kafka:
    image: confluentinc/cp-kafka:7.7.7
    container_name: kafka
    hostname: kafka
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:6062,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:6062

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      TZ: Asia/Kolkata
    ports:
      - "7072:6062"
    volumes:
      - ./kafka-data:/var/lib/kafka/data

    restart: always

    networks:
      - s-network

  ## Zipkin
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9412:9411"
    networks:
      - s-network

  ## Eureka Server
  discovery-server:
    image: sairam8276/discovery-server:latest
    container_name: discovery-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - zipkin
    ports:
      - "8762:8761"
    networks:
      - s-network

  ## API Gateway
  api-gateway:
    image: sairam8276/api-gateway:latest
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: TRACE
    depends_on:
      - zipkin
      - discovery-server
      - keycloak
    ports:
      - "9090:8080"
    networks:
      - s-network

  ## Product Service
  product-service:
    container_name: product-service
    image: sairam8276/product-service:latest
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mongo-product-service
      - discovery-server
      - api-gateway
    ports:
      - "9091:8081"
    networks:
      - s-network

  ## Order Service
  order-service:
    container_name: order-service
    image: sairam8276/order-service:latest
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-order-service:3306/order_service
    depends_on:
      - mysql-order-service
      - kafka
      - zipkin
      - discovery-server
      - api-gateway
    ports:
      - "9092:8082"
    networks:
      - s-network

  ## Inventory Service
  inventory-service:
    container_name: inventory-service
    image: sairam8276/inventory-service:latest
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-inventory-service:3306/inventory_service
    depends_on:
      - mysql-inventory-service
      - discovery-server
      - api-gateway
    ports:
      - "9093:8083"
    networks:
      - s-network

  ## Notification Service
  notification-service:
    container_name: notification-service
    image: sairam8276/notification-service:latest
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - kafka
      - zipkin
      - discovery-server
      - api-gateway
    ports:
      - "9094:8084"
    networks:
      - s-network

  ## Prometheus
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - product-service
      - inventory-service
      - order-service
      - notification-service
    ports:
      - "9095:8085"
    networks:
      - s-network

  ## Grafana
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    volumes:
      - ./grafana:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: password
    depends_on:
      - prometheus
    ports:
      - "9096:8086"
    networks:
      - s-network

networks:
  s-network:
    driver: bridge